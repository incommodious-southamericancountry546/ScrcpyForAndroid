name: Android Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  ci-build:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-deps-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-${{ github.sha }}
          restore-keys: gradle-builds-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug and unsigned release APKs
        run: ./gradlew clean assembleDebug assembleRelease

      - name: Collect CI APKs
        run: |
          set -euxo pipefail
          mkdir -p out

          find app/build/outputs/apk -type f -name "*.apk" | sort > out/apk-list.txt
          cat out/apk-list.txt

          if [ ! -s out/apk-list.txt ]; then
            echo "No APK files were generated under app/build/outputs/apk"
            exit 1
          fi

          while IFS= read -r apk; do
            base_name="$(basename "$apk")"
            cp "$apk" "out/ci-${base_name}"
          done < out/apk-list.txt

          rm -f out/apk-list.txt

          ls -la out

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-apks-${{ github.run_number }}
          path: out/*.apk
          if-no-files-found: error

  release-build:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-deps-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-${{ github.sha }}
          restore-keys: gradle-builds-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug and unsigned release APKs
        run: ./gradlew clean assembleDebug assembleRelease

      - name: Collect release assets
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          mkdir -p dist

          find app/build/outputs/apk -type f -name "*.apk" | sort > dist/apk-list.txt
          cat dist/apk-list.txt

          if [ ! -s dist/apk-list.txt ]; then
            echo "No APK files were generated under app/build/outputs/apk"
            exit 1
          fi

          while IFS= read -r apk; do
            base_name="$(basename "$apk")"
            cp "$apk" "dist/${REPO_NAME}-${TAG}-${base_name}"
          done < dist/apk-list.txt

          rm -f dist/apk-list.txt

          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.apk
